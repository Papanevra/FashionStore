<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>Корзина</title>
<link rel="stylesheet" href="./css/style.css">
</head>

<body>

<header>

<div class="logo">
<a href="index.html">Fashion Store</a>
</div>

<nav>
<a href="index.html">Главная</a>
<a href="catalog.html">Каталог</a>
<a href="favorites.html">❤️ Избранное (<span id="fav-count">0</span>)</a>
<a href="about.html">О нас</a>
<a href="cart.html">🛒 <span id="cart-count">0</span></a>
<a href="contacts.html">Контакты</a>
</nav>

</header>

<h1>Корзина</h1>

<div class="cart">

<div id="cart-items"></div>

<h2>Итого: <span id="total">0 ₽</span></h2>

<button onclick="clearCart()">Очистить корзину</button>

<button class="btn" onclick="showOrderForm()">Оформить заказ</button>

</div>

<div id="order-form" style="display:none;">

<h2>Оформление заказа</h2>

<form onsubmit="sendOrder(event)">

<input type="text" placeholder="Ваше имя" required>

<input type="tel" placeholder="Телефон" required>

<textarea placeholder="Адрес доставки" required></textarea>

<button type="submit">Отправить заказ</button>

</form>

</div>

</div>
<div id="notification"></div>

<!-- КНОПКА ЧАТА -->
<div id="support-button">
💬
<span id="chat-badge">1</span>
</div>
<!-- ОКНО ЧАТА -->
<div id="support-chat">

<div class="chat-header">
Поддержка
<span id="close-chat">✖</span>
</div>

<div class="chat-body">
<p>Здравствуйте! Чем можем помочь?</p>
<div class="quick-buttons">
<button onclick="quickMsg('доставка')">🚚 Доставка</button>
<button onclick="quickMsg('цена')">💰 Цены</button>
<button onclick="quickMsg('заказ')">📦 Заказ</button>
</div>
</div>

<div class="chat-input">
<input type="text" id="chat-message" placeholder="Введите сообщение...">
<button onclick="sendMessage()">➤</button>
</div>

</div>

<script src="./js/script.js"></script>

</body>
</html>
